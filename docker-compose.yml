version: "3.8"

x-superset-common: &superset-common
  build:
    context: .
    dockerfile: Dockerfile
  image: superset-custom:latest
  environment: &superset-env
    SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
    DATABASE_HOST: postgres
    DATABASE_PORT: 5432
    DATABASE_DIALECT: postgresql
    DATABASE_USER: superset
    DATABASE_PASSWORD: ${DB_PASSWORD}
    DATABASE_DB: superset
    SQLALCHEMY_DATABASE_URI: postgresql+psycopg2://superset:${DB_PASSWORD}@postgres:5432/superset
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - superset-net

services:
  postgres:
    image: postgres:17-alpine
    container_name: superset-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: superset
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superset"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - superset-net

  superset-init:
    <<: *superset-common
    container_name: superset-init
    profiles:
      - init
    command: >
      bash -c "
        superset db upgrade &&
        superset fab create-admin --username admin --firstname Admin --lastname User --email admin@example.com --password ${ADMIN_PASSWORD} &&
        superset init &&
        echo 'Superset initialized successfully'
      "
    restart: "no"

  superset:
    <<: *superset-common
    container_name: superset
    ports:
      - "8088:8088"
    command: >
      bash -c "
        superset db upgrade &&
        gunicorn --bind 0.0.0.0:8088 --workers 4 --timeout 120 'superset.app:create_app()'
      "
    restart: unless-stopped
    volumes:
      - ./dashboards:/app/dashboards

volumes:
  pgdata:

networks:
  superset-net:
    driver: bridge
